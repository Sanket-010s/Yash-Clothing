[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = postgresql://neondb_owner:npg_QhWMqwC13usg@ep-silent-water-ao8wxehs-pooler.c-2.ap-southeast-1.aws.neon.tech/tshirt_db?sslmode=require
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
